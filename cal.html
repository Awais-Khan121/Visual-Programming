<!doctype html>
<html>
  <head>
    <title>Basic Calculator</title>

    <style>
      body {
        margin: 0;
        font-family: "Segoe UI", sans-serif;
        background: linear-gradient(135deg, #667eea, #764ba2);
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
      }

      /* Main Card */
      .container {
        background: rgba(255, 255, 255, 0.15);
        backdrop-filter: blur(15px);
        padding: 30px;
        border-radius: 20px;
        width: 350px;
        box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3);
        color: white;
      }

      /* Heading */
      .header {
        text-align: center;
        margin-bottom: 20px;
      }

      .header h1 {
        margin: 0;
        font-size: 24px;
        letter-spacing: 1px;
      }

      .header p {
        margin: 5px 0 0;
        font-size: 13px;
        opacity: 0.8;
      }

      /* Calculator */
      .calculator {
        background: #1f1f2e;
        padding: 20px;
        border-radius: 15px;
      }

      /* Display */
      .display {
        width: 100%;
        height: 60px;
        border: none;
        border-radius: 10px;
        margin-bottom: 20px;
        font-size: 22px;
        text-align: right;
        padding: 10px;
        background: #2d2d44;
        color: white;
      }

      /* Buttons Grid */
      .buttons {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 12px;
      }

      button {
        padding: 18px;
        font-size: 18px;
        border: none;
        border-radius: 12px;
        cursor: pointer;
        transition: 0.3s;
      }

      /* Number Buttons */
      .number {
        background: #3a3a5a;
        color: white;
      }

      .number:hover {
        background: #50507a;
      }

      /* Operator Buttons */
      .operator {
        background: #ff8c42;
        color: white;
      }

      .operator:hover {
        background: #ff6a00;
      }

      /* Equal Button */
      .equal {
        background: #00c896;
        color: white;
        grid-column: span 2;
      }

      .equal:hover {
        background: #00a67d;
      }

      /* Clear Button */
      .clear {
        background: #ff4d6d;
        color: white;
      }

      .clear:hover {
        background: #e63956;
      }

      .footer {
        text-align: center;
        margin-top: 15px;
        font-size: 12px;
        opacity: 0.8;
      }
    </style>
  </head>

  <body>
    <div class="container">
      <div class="header">
        <h1>Basic Calculator</h1>
        <p>Designed using HTML & CSS</p>
      </div>

      <div class="calculator">
        <input type="text" class="display" placeholder="0" />

        <div class="buttons">
          <button class="clear">C</button>
          <button class="operator">/</button>
          <button class="operator">*</button>
          <button class="operator">-</button>

          <button class="number">7</button>
          <button class="number">8</button>
          <button class="number">9</button>
          <button class="operator">+</button>

          <button class="number">4</button>
          <button class="number">5</button>
          <button class="number">6</button>
          <button class="equal">=</button>

          <button class="number">1</button>
          <button class="number">2</button>
          <button class="number">3</button>
          <button class="number">0</button>
        </div>
      </div>

      <div class="footer">BSCS-IV | Visual Programming Lab</div>
    </div>
  </body>
</html>
