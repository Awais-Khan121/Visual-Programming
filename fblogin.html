<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Facebook Login</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <style>
      body {
        background: #f0f2f5;
      }
      .login-card {
        max-width: 400px;
        margin: auto;
        margin-top: 120px;
        padding: 30px;
        border-radius: 15px;
        background: white;
        box-shadow: 0px 4px 15px rgba(0, 0, 0, 0.1);
      }
      .fb-title {
        color: #1877f2;
        font-weight: bold;
        text-align: center;
        font-size: 40px;
      }
    </style>
  </head>

  <body>
    <div class="login-card">
      <h2 class="fb-title">facebook</h2>

      <form>
        <div class="mb-3">
          <input
            type="email"
            class="form-control"
            placeholder="Email or Phone"
          />
        </div>

        <div class="mb-3">
          <input type="password" class="form-control" placeholder="Password" />
        </div>

        <button class="btn btn-primary w-100">Log In</button>

        <hr />

        <button class="btn btn-success w-100">Create New Account</button>
      </form>
    </div>
  </body>
</html>
