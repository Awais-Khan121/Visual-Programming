<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Facebook</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
      rel="stylesheet"
    />
    <style>
      body {
        background-color: #f0f2f5;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      }

      .fb-page {
        max-width: 600px;
        margin: 0 auto;
      }

      /* Header */
      .fb-header {
        background: #fff;
        position: sticky;
        top: 0;
        z-index: 100;
      }

      .fb-logo {
        font-size: 28px;
        font-weight: 700;
        color: #1877f2;
        letter-spacing: -0.5px;
      }

      .fb-icon-btn {
        width: 40px;
        height: 40px;
        border-radius: 50%;
        border: none;
        background: #e4e6eb;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 18px;
        color: #050505;
        cursor: pointer;
      }

      .fb-icon-btn:hover {
        background: #d8dadf;
      }

      .fb-icon-btn-sm {
        width: 32px;
        height: 32px;
        border-radius: 50%;
        border: none;
        background: transparent;
        font-size: 18px;
        color: #65676b;
        cursor: pointer;
      }

      /* Nav Tabs */
      .fb-nav-tab {
        flex: 1;
        border: none;
        background: none;
        padding: 10px 0;
        font-size: 22px;
        color: #65676b;
        cursor: pointer;
        border-bottom: 3px solid transparent;
      }

      .fb-nav-tab.active {
        color: #1877f2;
        border-bottom-color: #1877f2;
      }

      .fb-nav-tab:hover:not(.active) {
        background: #f0f2f5;
        border-radius: 8px 8px 0 0;
      }

      /* Card & Spacer */
      .fb-card {
        background: #fff;
      }

      .fb-spacer {
        height: 8px;
      }

      /* Avatar */
      .fb-avatar {
        width: 40px;
        height: 40px;
        border-radius: 50%;
        object-fit: cover;
      }

      /* Create Post */
      .fb-post-input {
        flex: 1;
        background: #f0f2f5;
        border-radius: 20px;
        padding: 10px 16px;
        color: #65676b;
        font-size: 15px;
        cursor: pointer;
      }

      .fb-post-input:hover {
        background: #e4e6eb;
      }

      .fb-post-action {
        border: none;
        background: none;
        padding: 10px 0;
        font-size: 14px;
        font-weight: 500;
        color: #65676b;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
      }

      .fb-post-action:hover {
        background: #f0f2f5;
      }

      .fb-vdivider {
        width: 1px;
        background: #e4e6eb;
        margin: 8px 0;
      }

      /* Stories */
      .fb-stories {
        overflow-x: auto;
        scrollbar-width: none;
      }

      .fb-stories::-webkit-scrollbar {
        display: none;
      }

      .fb-story {
        position: relative;
        width: 120px;
        height: 200px;
        border-radius: 12px;
        overflow: hidden;
        flex-shrink: 0;
        cursor: pointer;
      }

      .fb-story-img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      .fb-story-overlay {
        position: absolute;
        inset: 0;
        background: linear-gradient(
          to top,
          rgba(0, 0, 0, 0.5) 0%,
          transparent 50%
        );
      }

      .fb-story-create-bottom {
        position: absolute;
        bottom: 0;
        left: 0;
        right: 0;
        background: #fff;
        padding: 20px 0 10px;
        text-align: center;
      }

      .fb-story-plus {
        position: absolute;
        top: -18px;
        left: 50%;
        transform: translateX(-50%);
        width: 36px;
        height: 36px;
        border-radius: 50%;
        background: #1877f2;
        color: #fff;
        border: 4px solid #fff;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 18px;
      }

      .fb-story-name {
        font-size: 12px;
        font-weight: 600;
        color: #050505;
        line-height: 1.2;
      }

      .fb-story-avatar-ring {
        position: absolute;
        top: 8px;
        left: 8px;
        width: 40px;
        height: 40px;
        border-radius: 50%;
        border: 3px solid #1877f2;
        overflow: hidden;
        z-index: 2;
      }

      .fb-story-avatar {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      .fb-story-name-overlay {
        position: absolute;
        bottom: 8px;
        left: 8px;
        right: 8px;
        font-size: 12px;
        font-weight: 600;
        color: #fff;
        z-index: 2;
      }

      /* Feed Action Buttons */
      .fb-action-btn {
        border: none;
        background: none;
        padding: 10px 0;
        font-size: 14px;
        font-weight: 500;
        color: #65676b;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
        border-radius: 4px;
      }

      .fb-action-btn:hover {
        background: #f0f2f5;
      }

      .post-meta {
        font-size: 13px;
        color: #65676b;
      }
    </style>
  </head>
  <body>
    <div class="fb-page">
      <!-- Header -->
      <header class="fb-header">
        <div
          class="d-flex align-items-center justify-content-between px-3 py-2"
        >
          <span class="fb-logo">facebook</span>
          <div class="d-flex gap-2">
            <button class="fb-icon-btn"><i class="bi bi-search"></i></button>
            <button class="fb-icon-btn">
              <i class="bi bi-chat-dots-fill"></i>
            </button>
          </div>
        </div>
        <nav class="d-flex border-top">
          <button class="fb-nav-tab active">
            <i class="bi bi-house-door-fill"></i>
          </button>
          <button class="fb-nav-tab"><i class="bi bi-play-btn"></i></button>
          <button class="fb-nav-tab"><i class="bi bi-shop"></i></button>
          <button class="fb-nav-tab"><i class="bi bi-people"></i></button>
          <button class="fb-nav-tab"><i class="bi bi-bell"></i></button>
          <button class="fb-nav-tab"><i class="bi bi-list"></i></button>
        </nav>
      </header>

      <!-- Create Post -->
      <div class="fb-card">
        <div class="d-flex align-items-center gap-3 px-3 py-3">
          <img
            src="WhatsApp Image 2026-03-02 at 7.35.14 PM.jpeg"
            alt="You"
            class="fb-avatar"
          />
          <div class="fb-post-input">What's on your mind?</div>
        </div>
        <div class="d-flex border-top">
          <button class="fb-post-action flex-fill">
            <i class="bi bi-image text-success"></i> Photo
          </button>
          <div class="fb-vdivider"></div>
          <button class="fb-post-action flex-fill">
            <i class="bi bi-emoji-smile text-warning"></i> Feeling
          </button>
          <div class="fb-vdivider"></div>
          <button class="fb-post-action flex-fill">
            <i class="bi bi-geo-alt-fill text-danger"></i> Location
          </button>
        </div>
      </div>

      <div class="fb-spacer"></div>

      <!-- Stories -->
      <div class="fb-card py-3">
        <div class="fb-stories d-flex gap-2 px-3">
          <!-- Create Story -->
          <div class="fb-story">
            <img
              src="WhatsApp Image 2026-03-02 at 7.35.14 PM.jpeg"
              alt="Create"
              class="fb-story-img"
            />
            <div class="fb-story-create-bottom">
              <div class="fb-story-plus"><i class="bi bi-plus-lg"></i></div>
              <span class="fb-story-name mt-2">Create a<br />Story</span>
            </div>
          </div>
          <!-- Story 1 -->
          <div class="fb-story">
            <img
              src="https://picsum.photos/seed/canyon/300/500"
              alt="Story"
              class="fb-story-img"
            />
            <div class="fb-story-avatar-ring">
              <img
                src="https://i.pravatar.cc/100?img=5"
                alt=""
                class="fb-story-avatar"
              />
            </div>
            <div class="fb-story-overlay"></div>
            <span class="fb-story-name-overlay">Donald Trump</span>
          </div>
        </div>
      </div>

      <div class="fb-spacer"></div>

      <!-- Post 1 -->
      <div class="fb-card">
        <div
          class="d-flex align-items-center justify-content-between px-3 pt-3 pb-2"
        >
          <div class="d-flex align-items-center gap-2">
            <img
              src="WhatsApp Image 2026-03-02 at 7.35.14 PM.jpeg"
              alt="Sarah"
              class="fb-avatar"
            />
            <div>
              <div class="fw-semibold" style="font-size: 14px">Awais Khan</div>
              <div class="text-muted" style="font-size: 12px">
                2h · <i class="bi bi-globe2"></i>
              </div>
            </div>
          </div>
          <button class="fb-icon-btn-sm">
            <i class="bi bi-three-dots"></i>
          </button>
        </div>
        <p class="px-3 pb-2 mb-0" style="font-size: 14px">
          New Profile picture
        </p>
        <img
          src="WhatsApp Image 2026-03-02 at 7.35.14 PM.jpeg"
          alt="Post"
          class="w-100"
        />
        <div class="d-flex justify-content-between px-3 py-2 post-meta">
          <span>👍 142</span>
          <span>23 comments · 5 shares</span>
        </div>
        <div class="d-flex border-top mx-3">
          <button class="fb-action-btn flex-fill">
            <i class="bi bi-hand-thumbs-up"></i> Like
          </button>
          <button class="fb-action-btn flex-fill">
            <i class="bi bi-chat"></i> Comment
          </button>
          <button class="fb-action-btn flex-fill">
            <i class="bi bi-share"></i> Share
          </button>
        </div>
      </div>

      <div class="fb-spacer"></div>

      <div class="fb-spacer"></div>
    </div>
  </body>
</html>
